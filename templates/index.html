 <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Med-Ai Pharma | Prototip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 400px; border-radius: 15px; z-index: 1; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <nav class="bg-blue-700 p-4 text-white shadow-lg flex justify-between items-center px-8">
        <h1 class="text-xl font-black italic">MED-AI PHARMA</h1>
        <div id="user-info">
            <button onclick="openModal()" class="bg-white text-blue-700 px-4 py-2 rounded-lg font-bold text-sm shadow-md hover:bg-blue-50">KIRISH / REGISTRATSIYA</button>
        </div>
    </nav>

    <main class="container mx-auto py-6 px-4">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="space-y-4">
                <div id="search-section" class="bg-white p-4 rounded-xl shadow-sm border">
                    <h2 class="font-bold mb-2 text-blue-700">🔍 Dori qidirish</h2>
                    <input id="search-input" oninput="search()" type="text" class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="Masalan: Sitramon...">
                </div>

                <div id="cart-section" class="bg-white p-4 rounded-xl shadow-sm border">
                    <h2 class="font-bold mb-2 text-blue-700">🛒 Savatcha</h2>
                    <div id="cart-list" class="space-y-2 text-sm text-gray-700"></div>
                    <button onclick="checkoutCart()" class="mt-2 bg-green-500 text-white px-4 py-2 rounded-lg text-xs font-bold">Buyurtma berish</button>
                </div>

                <div id="orders-section" class="bg-white p-4 rounded-xl shadow-sm border">
                    <h2 class="font-bold mb-2 text-blue-700">📦 Buyurtmalar tarixi</h2>
                    <div id="orders-list" class="space-y-2 text-sm text-gray-700 max-h-[300px] overflow-y-auto"></div>
                </div>

                <div class="bg-white p-4 rounded-xl shadow-sm border">
                    <h2 id="list-title" class="font-bold mb-4 text-blue-700 border-b pb-2 text-sm">💊 Jonli Omborxona</h2>
                    <div id="pharmacy-info" class="text-xs mb-2"></div>
                    <div id="dynamic-list" class="space-y-3 max-h-[500px] overflow-y-auto">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div id="map" class="shadow-md border border-slate-200"></div>
                
                <div class="bg-white rounded-xl shadow-lg border flex flex-col h-[250px]">
                    <div id="chat-box" class="flex-grow overflow-y-auto p-4 text-sm space-y-2">
                        <div class="bg-blue-50 p-2 rounded-lg w-fit text-blue-800"><b>Med-Ai:</b> Salomatligingiz haqida so'rang!</div>
                    </div>
                    <div class="p-3 border-t flex gap-2">
                        <input id="chat-input" type="text" class="flex-grow border p-2 rounded-lg outline-none" placeholder="Savolingizni yozing...">
                        <button onclick="askBot()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition">Yuborish</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="loginModal" class="modal">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-96 space-y-4 relative">
            <h2 class="text-2xl font-bold text-center text-blue-700">Profil yaratish</h2>
            <input id="reg-name" type="text" placeholder="Ismingiz yoki Dorixona nomi" class="w-full p-3 border rounded-xl outline-none focus:ring-1 focus:ring-blue-500 text-sm">
            <input id="reg-phone" type="text" placeholder="Telefon (998...)" class="w-full p-3 border rounded-xl outline-none focus:ring-1 focus:ring-blue-500 text-sm">
            <select id="reg-role" class="w-full p-3 border rounded-xl outline-none bg-white text-sm">
                <option value="user">Mijoz (Dori olaman)</option>
                <option value="pharmacy">Dorixona (Sotaman)</option>
                <option value="courier">Kuryer (Yetkazaman)</option>
            </select>
            <button onclick="registerUser()" class="w-full bg-blue-700 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-blue-800">RO'YXATDAN O'TISH</button>
            <button onclick="closeModal()" class="w-full text-gray-400 text-xs mt-2">Yopish</button>
        </div>
    </div>

    
    <div id="contactModal" class="modal">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-96 space-y-4 relative">
            <h2 class="text-2xl font-bold text-center text-blue-700">Aloqa raqamingiz</h2>
            <input id="contact-phone" type="text" placeholder="Telefon (998...)" class="w-full p-3 border rounded-xl outline-none focus:ring-1 focus:ring-blue-500 text-sm">
            <button id="contact-submit" onclick="submitContact()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-green-700">Yuborish</button>
            <button onclick="closeContactModal()" class="w-full text-gray-400 text-xs mt-2">Bekor qilish</button>
        </div>
    </div>
    
    
    <script id="pharm-info-json" type="application/json">
        {{ pharmacy_info | tojson }}
    </script>
    <script src="/static/app.js"></script>
</body>
</html>
